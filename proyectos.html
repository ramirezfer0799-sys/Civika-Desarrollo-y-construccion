<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyectos | CIVIKA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f4f4f4}

header{
  background:#0f172a;
  color:white;
  text-align:center;
  padding:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}
</style>
</head>

<body>

<header>
  <h1>Proyectos Conceptuales CIVIKA</h1>
  <a href="index.html" style="color:white">← Volver</a>
</header>

<div class="grid">

  <div class="card">
    <img src="obra1.png">
    <div class="card-content">
      <h3>Modern Cabin</h3>
    </div>
  </div>

  <div class="card">
    <img src="obra2.png">
    <div class="card-content">
      <h3>Modern Brutalist</h3>
    </div>
  </div>

  <div class="card">
    <img src="obra3.png">
    <div class="card-content">
      <h3>Neo-Gothic</h3>
    </div>
  </div>

  <div class="card">
    <img src="obra4.png">
    <div class="card-content">
      <h3>Hybrid</h3>
    </div>
  </div>

</div>

</body>
</html>
