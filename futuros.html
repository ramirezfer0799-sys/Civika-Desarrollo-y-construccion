<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyectos Futuros | CIVIKA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f4f4f4}

header{
  background:#0f172a;
  color:white;
  text-align:center;
  padding:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}
</style>
</head>

<body>

<header>
  <h1>Proyectos Futuros CIVIKA</h1>
  <p>Conceptos en desarrollo y expansión de portafolio</p>
  <a href="index.html" style="color:white">← Volver</a>
</header>

<div class="grid">

  <div class="card">
    <img src="./futuro1.jpg" alt="Proyecto futuro 1"
         onerror="this.src='obra1.jpg'">
    <div class="card-content">
      <h3>Vivienda Social Optimizada</h3>
      <p>Modelo de interés social medio con diseño eficiente y atractivo.</p>
    </div>
  </div>

  <div class="card">
    <img src="./futuro2.jpg" alt="Proyecto futuro 2"
         onerror="this.src='obra2.jpg'">
    <div class="card-content">
      <h3>Desarrollo Vertical Compacto</h3>
      <p>Propuesta de vivienda urbana en lotes reducidos.</p>
    </div>
  </div>

</div>

</body>
</html>
